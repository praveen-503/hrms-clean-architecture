# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - app-hrms-api-dev

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'HRPayrollSystem.slnx'
      - '.github/workflows/main_app-hrms-api-dev.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build src/HRPayroll.API/HRPayroll.API.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish src/HRPayroll.API/HRPayroll.API.csproj -c Release -o ${{ github.workspace }}/publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ github.workspace }}/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F0D1E46452344A17B718462873E4A916 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C9466A2915D645DA8F3515FCA1E96480 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_181E38F9396248F5AA4B39CD7EA6BE58 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-hrms-api-dev'
          slot-name: 'Production'
          package: ./publish
          